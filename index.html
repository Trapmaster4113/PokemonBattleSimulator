<!DOCTYPE HTML>
<head>
        <meta charset="UTF-8">
        <title>SRPG TEST</title>
    </head>
    <body>
        <canvas id="ctx" width="1850" height="850" style="border:1px solid #000000;"></canvas>
    </body>
    <script src="Pokemon.js"></script>
    <script>
        var canvas = document.getElementById('ctx');
        var ctx = canvas.getContext("2d");
        var click = 0;
        ctx.font = '15px Arial'; //Change Font
        ctx.fillStyle = 'black'; //Color of the text and forms
        ctx.globalAplha = 0.5; //Transparency 0 = invisible, 1 = visible
        var HEIGHT = document.getElementById('ctx').height;
        var WIDTH = document.getElementById('ctx').width;
        drawBeneath = function(x,y) {
            ctx.save();
            ctx.fillStyle = "rgba(128,128,128,0.3)";
            ctx.beginPath();
            ctx.ellipse(x,y, WIDTH/8*1.5, HEIGHT/8*1.5,0,0, 2*Math.PI);
            ctx.stroke();
            ctx.fill();
            ctx.restore();
        }
        drawBeneath(WIDTH*3/4, HEIGHT/4);
        drawBeneath(WIDTH/4, HEIGHT*3/4);
        var one = pokemon("Turtwig", ["Grass"], ['Tackle', 'Withdraw'], 50, 50, 50, 50);
        var two = pokemon("Chimchar", ["Fire"], ['Scratch', 'Leer'], 50, 50, 50, 50);
        drawPokemon = function(one,two) {
            ctx.save();
            ctx.fillStyle = 'Green';
            ctx.fillRect(WIDTH/8*1.5, HEIGHT*5.5/8, WIDTH/8, HEIGHT/8);
            ctx.fillStyle = 'Red';
            ctx.fillRect(WIDTH/8*5.5, HEIGHT/8*1.5, WIDTH/8, HEIGHT/8);
            ctx.restore();
        }
        drawBattleUI = function(pokemon1, pokemon2) {
            ctx.save();
            ctx.fillStyle = "rgba(128,128,128,0.25)";
            ctx.fillRect(0, HEIGHT/16, WIDTH*3/8,HEIGHT/16);
            ctx.fillRect(WIDTH*5/8, HEIGHT*9/16, WIDTH*3/8,HEIGHT/16);
            ctx.fillStyle = "Green";
            ctx.fillRect(WIDTH/64, HEIGHT*5/64, WIDTH*22/64*pokemon2.hp/pokemon2.maxHP, HEIGHT/32);
            ctx.fillRect(WIDTH*41/64,HEIGHT*37/64, WIDTH*22/64*pokemon1.hp/pokemon1.maxHP, HEIGHT/32);
            ctx.fillStyle = "Black";
            ctx.fillText(pokemon2.name, 0, HEIGHT/16);
            ctx.fillText(pokemon1.name, WIDTH*5/8, HEIGHT*9/16);
            ctx.restore();
        }
        drawPokemon(one,two);
        drawBattleUI(one,two);
        /*update = function() {
            ctx.clearRect(0,0, WIDTH, HEIGHT);
        }
        setInterval(update, 40);*/
    </script>
</html>
